<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>3D あみだくじ</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;overflow:hidden;font-family:'Meiryo',sans-serif}
#ui{position:fixed;top:0;left:0;right:0;background:rgba(26,26,46,0.92);padding:8px 16px;z-index:10;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #333;backdrop-filter:blur(8px)}
#ui h1{font-size:16px;color:#ffd700}
.ct{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.b{padding:5px 14px;background:rgba(255,215,0,0.1);border:1px solid #ffd700;border-radius:20px;color:#ffd700;font-size:12px;cursor:pointer;transition:all .2s}
.b:hover{background:rgba(255,215,0,0.3)}
.b:disabled{opacity:0.3;cursor:not-allowed}
#result{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.85);color:#ffd700;padding:30px 50px;border-radius:16px;font-size:24px;font-weight:700;display:none;z-index:20;text-align:center;border:2px solid #ffd700;backdrop-filter:blur(10px)}
#result .sub{font-size:14px;color:#aaa;margin-top:8px}
#names{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);z-index:10;display:flex;gap:20px}
.name-tag{background:rgba(0,0,0,0.6);color:#fff;padding:6px 16px;border-radius:8px;font-size:12px;text-align:center;backdrop-filter:blur(6px);border:1px solid #444;min-width:60px}
.name-tag .emoji{font-size:28px;display:block;margin-bottom:4px}
#legend{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);color:#555;font-size:10px;z-index:10}
</style>
</head>
<body>
<div id="ui">
  <h1>🎋 3D あみだくじ</h1>
  <div class="ct">
    <select id="playerSelect" style="padding:4px 8px;background:#222;color:#ffd700;border:1px solid #555;border-radius:4px;font-size:12px">
      <option value="0">① 左から選ぶ</option>
      <option value="1">②</option>
      <option value="2">③</option>
      <option value="3">④</option>
      <option value="4">⑤</option>
    </select>
    <button class="b" id="goBtn" onclick="startAmida()">▶ スタート</button>
    <button class="b" onclick="regenerate()">🔄 くじ再生成</button>
    <button class="b" onclick="resetCam()">📷 リセット</button>
  </div>
</div>
<div id="result"></div>
<div id="names"></div>
<div id="legend">ドラッグで回転 ｜ スクロールでズーム ｜ 線を選んでスタート</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
const COLS=5, HEIGHT=10, SPACING=2;
const PRIZES=['🏆 大当たり!','🍺 おごり','🧹 掃除当番','💰 500円','😎 セーフ'];
const EMOJIS=['😀','😎','🤩','🥳','😺'];
const COLORS=[0xff4444,0x44aaff,0x44ff88,0xffaa44,0xaa44ff];

let scene,camera,renderer,ctrl,ball,ballPath=[],ballIdx=0,animating=false;
let ladders=[]; // 横棒データ [{row,col}]
let vertLines=[],horizLines=[];

function init(){
  scene=new THREE.Scene();scene.background=new THREE.Color(0x1a1a2e);
  camera=new THREE.PerspectiveCamera(50,innerWidth/innerHeight,0.1,100);
  camera.position.set(4,5,12);
  renderer=new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(innerWidth,innerHeight);
  document.body.appendChild(renderer.domElement);
  ctrl=new THREE.OrbitControls(camera,renderer.domElement);
  ctrl.enableDamping=true;ctrl.dampingFactor=0.08;ctrl.target.set(4,5,0);

  scene.add(new THREE.AmbientLight(0x444466,0.6));
  const dl=new THREE.DirectionalLight(0xffffff,0.8);dl.position.set(5,15,10);scene.add(dl);
  scene.add(new THREE.HemisphereLight(0x6666aa,0x222233,0.3));

  // 背景パーティクル
  const pGeo=new THREE.BufferGeometry();const pPos=new Float32Array(300*3);
  for(let i=0;i<300;i++){pPos[i*3]=(Math.random()-0.5)*30;pPos[i*3+1]=Math.random()*15;pPos[i*3+2]=(Math.random()-0.5)*20;}
  pGeo.setAttribute('position',new THREE.BufferAttribute(pPos,3));
  scene.add(new THREE.Points(pGeo,new THREE.PointsMaterial({color:0xffd700,size:0.05,transparent:true,opacity:0.4})));

  generateAmida();
  makeBall();
  makeLabels();
  animate();
}

function generateAmida(){
  // 既存クリア
  vertLines.forEach(l=>scene.remove(l));horizLines.forEach(l=>scene.remove(l));
  vertLines=[];horizLines=[];ladders=[];

  // 縦線
  for(let c=0;c<COLS;c++){
    const mat=new THREE.MeshStandardMaterial({color:0x888899,roughness:0.3,metalness:0.6});
    const geo=new THREE.CylinderGeometry(0.04,0.04,HEIGHT,8);
    const m=new THREE.Mesh(geo,mat);
    m.position.set(c*SPACING,HEIGHT/2,0);scene.add(m);vertLines.push(m);
    // 上下の丸
    const topBall=new THREE.Mesh(new THREE.SphereGeometry(0.12,12,12),new THREE.MeshStandardMaterial({color:COLORS[c],emissive:COLORS[c],emissiveIntensity:0.3}));
    topBall.position.set(c*SPACING,HEIGHT+0.2,0);scene.add(topBall);vertLines.push(topBall);
  }

  // 横棒をランダム生成
  const rows=12;
  for(let r=1;r<=rows;r++){
    const y=HEIGHT-(r*HEIGHT/(rows+1));
    // 各行でランダムに横棒を配置（隣接しないように）
    const used=new Set();
    for(let c=0;c<COLS-1;c++){
      if(used.has(c)||used.has(c-1))continue;
      if(Math.random()>0.45){
        ladders.push({row:r,col:c,y});
        used.add(c);
        // 横棒描画
        const mat=new THREE.MeshStandardMaterial({color:0xffd700,roughness:0.4,metalness:0.5,emissive:0x332200,emissiveIntensity:0.2});
        const geo=new THREE.CylinderGeometry(0.03,0.03,SPACING,8);
        geo.rotateZ(Math.PI/2);
        const m=new THREE.Mesh(geo,mat);
        m.position.set(c*SPACING+SPACING/2,y,0);scene.add(m);horizLines.push(m);
        // 接続部の球
        [0,1].forEach(i=>{
          const j=new THREE.Mesh(new THREE.SphereGeometry(0.06,8,8),new THREE.MeshStandardMaterial({color:0xffd700}));
          j.position.set((c+i)*SPACING,y,0);scene.add(j);horizLines.push(j);
        });
      }
    }
  }
}

function makeBall(){
  if(ball)scene.remove(ball);
  const geo=new THREE.SphereGeometry(0.18,16,16);
  const mat=new THREE.MeshStandardMaterial({color:0xff2244,emissive:0xff0000,emissiveIntensity:0.4,roughness:0.2,metalness:0.8});
  ball=new THREE.Mesh(geo,mat);
  // グロー
  const glow=new THREE.PointLight(0xff2244,0.8,3);ball.add(glow);
  ball.position.set(0,HEIGHT+0.5,0);ball.visible=false;
  scene.add(ball);
}

function makeLabels(){
  const nd=document.getElementById('names');nd.innerHTML='';
  for(let c=0;c<COLS;c++){
    const d=document.createElement('div');d.className='name-tag';
    d.innerHTML=`<span class="emoji">${EMOJIS[c]}</span>${PRIZES[c]}`;
    nd.appendChild(d);
  }
  // 3Dラベル（上部: 番号、下部: 景品）
  for(let c=0;c<COLS;c++){
    // 上部番号
    const cv=document.createElement('canvas');cv.width=128;cv.height=128;
    const cx=cv.getContext('2d');cx.fillStyle='rgba(0,0,0,0)';cx.clearRect(0,0,128,128);
    cx.font='60px sans-serif';cx.textAlign='center';cx.fillText(EMOJIS[c],64,80);
    const tex=new THREE.CanvasTexture(cv);
    const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:tex,transparent:true}));
    sp.position.set(c*SPACING,HEIGHT+0.8,0);sp.scale.set(0.8,0.8,1);scene.add(sp);vertLines.push(sp);
    // 下部景品
    const cv2=document.createElement('canvas');cv2.width=256;cv2.height=64;
    const cx2=cv2.getContext('2d');cx2.clearRect(0,0,256,64);
    cx2.fillStyle='#ffd700';cx2.font='bold 20px sans-serif';cx2.textAlign='center';cx2.fillText(PRIZES[c],128,40);
    const sp2=new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(cv2),transparent:true}));
    sp2.position.set(c*SPACING,-0.6,0);sp2.scale.set(0.8,0.2,1);scene.add(sp2);vertLines.push(sp2);
  }
}

// ===== あみだ経路計算 =====
function calcPath(startCol){
  const path=[];
  let col=startCol,y=HEIGHT;
  path.push({x:col*SPACING,y});
  // 横棒をy降順でソート
  const sorted=[...ladders].sort((a,b)=>b.y-a.y);
  for(const lad of sorted){
    if(lad.col===col){
      path.push({x:col*SPACING,y:lad.y});
      col=col+1;
      path.push({x:col*SPACING,y:lad.y});
    }else if(lad.col===col-1){
      path.push({x:col*SPACING,y:lad.y});
      col=col-1;
      path.push({x:col*SPACING,y:lad.y});
    }
  }
  path.push({x:col*SPACING,y:0});
  return {path,endCol:col};
}

// ===== アニメーション =====
function startAmida(){
  if(animating)return;
  const startCol=parseInt(document.getElementById('playerSelect').value);
  const {path,endCol}=calcPath(startCol);
  ballPath=path;ballIdx=0;animating=true;
  ball.visible=true;ball.position.set(path[0].x,path[0].y,0.3);
  ball.material.color.set(COLORS[startCol]);
  ball.children[0].color.set(COLORS[startCol]);
  document.getElementById('goBtn').disabled=true;
  document.getElementById('result').style.display='none';

  // トレイル
  const trailGeo=new THREE.BufferGeometry();
  const trailPts=path.map(p=>new THREE.Vector3(p.x,p.y,0.3));
  trailGeo.setFromPoints(trailPts);
  const trail=new THREE.Line(trailGeo,new THREE.LineBasicMaterial({color:COLORS[startCol],transparent:true,opacity:0}));
  scene.add(trail);

  let step=0;const totalSteps=path.length*30;
  function moveBall(){
    if(step>=totalSteps){
      animating=false;document.getElementById('goBtn').disabled=false;
      // 結果表示
      const res=document.getElementById('result');
      res.innerHTML=`${EMOJIS[startCol]} → ${PRIZES[endCol]}<div class="sub">ライン${startCol+1} の結果</div>`;
      res.style.display='block';
      setTimeout(()=>res.style.display='none',4000);
      return;
    }
    const progress=step/totalSteps;
    const totalDist=path.reduce((s,p,i)=>i===0?0:s+Math.sqrt((p.x-path[i-1].x)**2+(p.y-path[i-1].y)**2),0);
    let target=progress*totalDist,acc=0;
    for(let i=1;i<path.length;i++){
      const seg=Math.sqrt((path[i].x-path[i-1].x)**2+(path[i].y-path[i-1].y)**2);
      if(acc+seg>=target){
        const t=(target-acc)/seg;
        ball.position.x=path[i-1].x+(path[i].x-path[i-1].x)*t;
        ball.position.y=path[i-1].y+(path[i].y-path[i-1].y)*t;
        ball.position.z=0.3;
        break;
      }
      acc+=seg;
    }
    // トレイル表示
    trail.material.opacity=Math.min(0.6,progress*2);
    step++;
    requestAnimationFrame(moveBall);
  }
  moveBall();
}

function regenerate(){
  if(animating)return;
  // シーンから横棒クリア
  horizLines.forEach(l=>scene.remove(l));horizLines=[];
  vertLines.forEach(l=>scene.remove(l));vertLines=[];
  // 景品シャッフル
  for(let i=PRIZES.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[PRIZES[i],PRIZES[j]]=[PRIZES[j],PRIZES[i]];}
  generateAmida();makeLabels();makeBall();
  document.getElementById('result').style.display='none';
}

function resetCam(){
  const d=600,sx=camera.position.x,sy=camera.position.y,sz=camera.position.z,st=Date.now();
  (function s(){const t=Math.min((Date.now()-st)/d,1),e=t<.5?2*t*t:-1+(4-2*t)*t;
    camera.position.set(sx+(4-sx)*e,sy+(5-sy)*e,sz+(12-sz)*e);ctrl.target.set(4,5,0);ctrl.update();
    if(t<1)requestAnimationFrame(s);
  })();
}

function animate(){requestAnimationFrame(animate);ctrl.update();
  // ボール回転
  if(ball&&ball.visible){ball.rotation.x+=0.05;ball.rotation.z+=0.03;}
  renderer.render(scene,camera);
}

window.addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
init();
</script>
</body>
</html>
