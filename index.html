<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>あみだくじEX</title>

<style>
body {
  text-align: center;
  font-family: sans-serif;
  background: black;
  color: white;
}

canvas {
  border: 2px solid white;
  margin-top: 10px;
}

button {
  margin-top: 10px;
  padding: 10px 20px;
  font-size: 18px;
  background: gold;
  border: none;
  border-radius: 10px;
}

#result {
  font-size: 28px;
  margin-top: 10px;
  color: yellow;
  animation: blink 0.5s infinite;
}

@keyframes blink {
  50% { opacity: 0.2; }
}
</style>
</head>

<body>

<h1>🎉 あみだくじEX 🎉</h1>
<canvas id="amida" width="320" height="500"></canvas><br>
<button onclick="generate()">🎲 生成</button>
<div id="result"></div>

<script>
const canvas = document.getElementById("amida");
const ctx = canvas.getContext("2d");

const LINE_COUNT = 5;
const WIDTH = canvas.width;
const HEIGHT = canvas.height;

let horizontalLines = [];
let results = [];
let particles = [];

// 🎵 音
const sounds = {
  start: new Audio("start.mp3"),
  move: new Audio("move.mp3"),
  goal: new Audio("goal.mp3")
};

// 金額生成
function generateResults() {
  let arr = [];
  for (let i = 1; i <= 10; i++) {
    arr.push(i * 1000);
  }
  arr.sort(() => Math.random() - 0.5);
  return arr.slice(0, LINE_COUNT);
}

// 🎲 生成
function generate() {
  ctx.clearRect(0, 0, WIDTH, HEIGHT);
  document.getElementById("result").innerText = "";

  const spacing = WIDTH / (LINE_COUNT + 1);

  // 縦線
  for (let i = 1; i <= LINE_COUNT; i++) {
    ctx.strokeStyle = "white";
    ctx.beginPath();
    ctx.moveTo(spacing * i, 0);
    ctx.lineTo(spacing * i, HEIGHT);
    ctx.stroke();
  }

  // 横線
  horizontalLines = [];
  for (let y = 50; y < HEIGHT - 50; y += 50) {
    if (Math.random() > 0.4) {
      let x = Math.floor(Math.random() * (LINE_COUNT - 1)) + 1;
      horizontalLines.push({x, y});

      ctx.strokeStyle = "cyan";
      ctx.beginPath();
      ctx.moveTo(spacing * x, y);
      ctx.lineTo(spacing * (x + 1), y);
      ctx.stroke();
    }
  }

  // 金額
  results = generateResults();

  ctx.fillStyle = "yellow";
  for (let i = 0; i < LINE_COUNT; i++) {
    ctx.fillText(results[i] + "円", spacing * (i + 1) - 15, HEIGHT - 10);
  }
}

// 👆 タップ開始（iOS対応）
canvas.addEventListener("click", (e) => {
  const spacing = WIDTH / (LINE_COUNT + 1);
  let index = Math.round(e.offsetX / spacing) - 1;

  if (index < 0 || index >= LINE_COUNT) return;

  playSound("start");
  tracePath(index);
});

// 🔥 追跡
function tracePath(startIndex) {
  let xIndex = startIndex;
  let y = 0;
  const spacing = WIDTH / (LINE_COUNT + 1);

  function step() {
    if (y > HEIGHT - 50) {
      showResult(results[xIndex]);
      playSound("goal");
      explode(spacing * (xIndex + 1), y);
      return;
    }

    // 横移動
    for (let line of horizontalLines) {
      if (Math.abs(line.y - y) < 5 && line.x - 1 === xIndex) {
        xIndex++;
      } else if (Math.abs(line.y - y) < 5 && line.x === xIndex) {
        xIndex--;
      }
    }

    y += 5;
    drawTrail(xIndex, y);
    playSound("move");

    requestAnimationFrame(step);
  }

  step();
}

// 🔴 軌跡
function drawTrail(index, y) {
  const spacing = WIDTH / (LINE_COUNT + 1);

  ctx.fillStyle = "red";
  ctx.fillRect(spacing * (index + 1) - 3, y, 6, 6);
}

// 🎉 結果表示
function showResult(value) {
  document.getElementById("result").innerText = "💰 " + value + "円 !!! 💰";
}

// 💥 パーティクル
function explode(x, y) {
  for (let i = 0; i < 30; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 6,
      vy: (Math.random() - 0.5) * 6,
      life: 30
    });
  }
}

// 🎇 パーティクル描画
function updateParticles() {
  ctx.fillStyle = "orange";
  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.life--;
    ctx.fillRect(p.x, p.y, 3, 3);
  });
  particles = particles.filter(p => p.life > 0);
  requestAnimationFrame(updateParticles);
}

// 🔊 音再生
function playSound(type) {
  if (!sounds[type]) return;
  sounds[type].currentTime = 0;
  sounds[type].play().catch(() => {});
}

// 初期化
generate();
updateParticles();
</script>

</body>
</html>
